<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Glyph3-wk</title>

<style>
.x7a{font-family:Arial;background:#0f0f14;color:#eaeaea;display:flex;justify-content:center;align-items:center;height:100vh}
.b3c{width:420px;padding:18px;background:#1a1b22;border-radius:14px;box-shadow:0 10px 30px #0008}
.h9d{font-size:20px;margin-bottom:10px}
.t1x{width:100%;height:90px;background:#111;color:#fff;border:1px solid #333;border-radius:8px;padding:8px}
.k2m{margin-top:8px;display:flex;gap:8px}
.k2m button{flex:1;background:#2b2d3a;color:#fff;border:0;padding:8px;border-radius:8px;cursor:pointer}
.k2m button:hover{background:#3a3d52}
.o8z{margin-top:10px;min-height:60px;background:#0c0c10;padding:10px;border-radius:8px;word-break:break-word;white-space:pre-wrap}
.i4q{width:100%;margin-top:8px;padding:6px;border-radius:8px;border:1px solid #333;background:#111;color:#fff}
</style>
</head>

<body class="x7a">
<div class="b3c">
  <div class="h9d">Glyph3-wk Encoder / Decoder</div>

  <textarea id="i" class="t1x" placeholder="Enter text..."></textarea>
  <input id="k" class="i4q" type="number" placeholder="Encoding key (e.g. 3)">

  <div class="k2m">
    <button onclick="a()">Encode</button>
    <button onclick="b()">Decode</button>
    <button onclick="c()">Bruteforce</button>
  </div>

  <div class="o8z" id="o"></div>
</div>

<script>
const L={"A":"Q7M","B":"L2X","C":"T9R","D":"J5P","E":"W8K","F":"N3D","G":"H6Q","H":"Z1T","I":"R4B","J":"C7Y","K":"P2L","L":"X5N","M":"V8C","N":"D1W","O":"K4H","P":"B7J","Q":"Y2F","R":"M5Z","S":"T8G","T":"L1Q","U":"R7N","V":"C4P","W":"H2X","X":"J8D","Y":"F5K","Z":"N1R"};
const N={"0":"AV3","1":"XV8","2":"MV1","3":"PV7","4":"KV5","5":"RV9","6":"TV2","7":"GV6","8":"BV4","9":"ZV0"};

const R1=Object.fromEntries(Object.entries(L).map(([a,b])=>[b,a]));
const R2=Object.fromEntries(Object.entries(N).map(([a,b])=>[b,a]));

const A="ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

const g=_=>((+document.getElementById("k").value||0)%26+26)%26;
const s=(c,x)=>{let i=A.indexOf(c);return i<0?c:A[(i+x)%26]};

function a(){
let x=document.getElementById("i").value,y=g(),r="";
for(let c of x){
let u=c.toUpperCase();
if(L[u])r+=L[s(u,y)];
else if(N[c])r+=N[c];
else r+="V4U"+c.codePointAt(0).toString(16).toUpperCase().padStart(4,"0");
}
document.getElementById("o").textContent=r;
}

function dec(x,y){
let r="",i=0;
while(i<x.length){
if(x.startsWith("V4U",i)){
r+=String.fromCodePoint(parseInt(x.slice(i+3,i+7),16));
i+=7;
}else{
let t=x.slice(i,i+3);
if(R2[t])r+=R2[t];
else if(R1[t]){
let c=R1[t],p=A.indexOf(c),o=((p-y)%26+26)%26;
r+=A[o];
}else r+="?";
i+=3;
}
}
return r;
}

function b(){
document.getElementById("o").textContent=dec(document.getElementById("i").value.trim(),g());
}

function c(){
let x=document.getElementById("i").value.trim(),r="";
for(let y=0;y<=26;y++)r+=`Key ${y}:\n${dec(x,y)}\n\n`;
document.getElementById("o").textContent=r;
}
</script>
</body>
</html>
