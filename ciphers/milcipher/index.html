<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Milcipher</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="x7a">
  <div class="b3c">
    <div class="h9d">MILCIPHER</div>
    
    <div class="k2m" style="margin-bottom: 8px;">
      <button onclick="generateCharmap()">Generate Charmap</button>
      <input type="file" id="charmapFile" style="display:none;" accept=".json" onchange="uploadCharmap(event)">
      <button onclick="document.getElementById('charmapFile').click()">Upload Charmap</button>
    </div>

    <textarea id="i" class="t1x" placeholder="Enter classified text..."></textarea>
    
    <div class="k2m">
      <button onclick="a()">Encode</button>
      <button onclick="b()">Decode</button>
    </div>
    
    <div class="o8z" id="o"></div>
  </div>

  <script>
    let M = null;
    let RM = null;

    function generateCharmap() {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+-=[]{}|;:,.<>?/`~ ';
      const map = {};
      const used = new Set();
      for (let c of chars) {
        let hash = '';
        do {
          hash = '';
          for (let i = 0; i < 8; i++) hash += chars[Math.floor(Math.random() * chars.length)];
        } while (used.has(hash));
        map[c] = hash;
        used.add(hash);
      }
      
      const blob = new Blob([JSON.stringify(map, null, 2)], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'milcipher_charmap.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      
      M = map;
      RM = Object.fromEntries(Object.entries(M).map(([k, v]) => [v, k]));
      document.getElementById('o').textContent = "Charmap generated, downloaded, and loaded into memory.";
    }

    function uploadCharmap(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          M = JSON.parse(e.target.result);
          RM = Object.fromEntries(Object.entries(M).map(([k, v]) => [v, k]));
          document.getElementById('o').textContent = "Charmap loaded successfully.";
        } catch (err) {
          document.getElementById('o').textContent = "Error parsing JSON charmap.";
        }
      };
      reader.readAsText(file);
    }

    function a() {
      if (!M) return document.getElementById('o').textContent = "Please generate or upload a charmap first.";
      const input = document.getElementById('i').value;
      let output = '';
      for (let char of input) {
        const upperChar = char.toUpperCase();
        if (M[upperChar]) {
          output += M[upperChar];
        } else {
          output += char; // Leave unsupported characters as they are
        }
      }
      document.getElementById('o').textContent = output;
    }

    function b() {
      if (!RM) return document.getElementById('o').textContent = "Please generate or upload a charmap first.";
      const input = document.getElementById('i').value.trim();
      let output = '';
      let i = 0;
      while (i < input.length) {
        const chunk = input.slice(i, i + 8);
        if (chunk.length === 8 && RM[chunk]) {
          output += RM[chunk];
          i += 8;
        } else {
          // Check if it's a 1-character passthrough
          let isPassthrough = true;
          for(let k in RM) {
            if(input.startsWith(k, i)) {
              output += RM[k];
              i += 8;
              isPassthrough = false;
              break;
            }
          }
          if(isPassthrough) {
            output += input[i];
            i += 1;
          }
        }
      }
      document.getElementById('o').textContent = output;
    }
  </script>
</body>
</html>
